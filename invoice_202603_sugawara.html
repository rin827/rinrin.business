<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>請求書 令和8年3月 菅原正憲</title>
<style>
  body { font-family: 'MS Mincho', 'Hiragino Mincho Pro', serif; max-width: 750px; margin: 30px auto; padding: 30px; font-size: 13px; }
  h1 { text-align: center; font-size: 28px; letter-spacing: 0.5em; border-bottom: 3px solid #000; padding-bottom: 8px; margin-bottom: 20px; }
  .date { text-align: right; margin-bottom: 20px; font-size: 13px; }
  .header { display: flex; justify-content: space-between; margin-bottom: 20px; }
  .recipient { font-size: 16px; border-bottom: 2px solid #000; padding-bottom: 4px; min-width: 200px; }
  .sender { font-size: 12px; line-height: 2; text-align: left; }
  .sender .zip { margin-bottom: 4px; }
  .subject { display: flex; gap: 10px; border-bottom: 1px solid #000; padding-bottom: 4px; margin-bottom: 4px; }
  .deadline { border-bottom: 1px solid #000; padding-bottom: 4px; margin-bottom: 20px; }
  .total-section { margin: 16px 0; }
  .total-label { font-size: 16px; font-weight: bold; border-bottom: 2px solid #000; display: inline-block; padding-right: 20px; }
  .total-amount { font-size: 20px; font-weight: bold; display: inline-block; margin-left: 20px; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  th, td { border: 1px solid #000; padding: 5px 8px; text-align: center; }
  th { background: #fff; }
  .item-name { text-align: left; }
  .amount { text-align: right; }
  .section-header td { text-align: left; font-weight: bold; }
  .subtotal td { font-weight: bold; }
  .empty td { height: 22px; }
</style>
</head>
<body>
<h1>請　求　書</h1>
<div class="date">令和　8　年　4　月　3　日</div>
<div class="header">
  <div>
    <div class="recipient">菅原　正憲　様</div>
    <div style="margin-top:16px;">下記の通り請求致します。</div>
    <div class="subject" style="margin-top:10px;"><span>件　名：令和8年3月　利用料金</span></div>
    <div class="deadline">支払期限　令和8年4月25日</div>
  </div>
  <div class="sender">
    <div class="zip">〒318−0022</div>
    <div>茨城県高萩市石滝2508-29</div>
    <div>（株）三嬴</div>
    <div>グループホームAo</div>
    <div>代表取締役　嶋川　侑太</div>
    <div>TEL　0293-44-3156</div>
  </div>
</div>
<div class="total-section">
  <span class="total-label">御請求金額</span>
  <span class="total-amount">¥69,500－</span>
  <span style="font-size:13px;">（税込）</span>
</div>
<table>
  <tr>
    <th style="width:35%;">品　名</th>
    <th style="width:20%;">摘　要</th>
    <th style="width:8%;">数量</th>
    <th style="width:15%;">単　価</th>
    <th style="width:15%;">金　額</th>
  </tr>
  <tr class="section-header"><td colspan="5">令和8年3月　利用料</td></tr>
  <tr><td class="item-name">家賃</td><td></td><td>1</td><td class="amount">26,000</td><td class="amount">26,000</td></tr>
  <tr><td class="item-name">食費</td><td></td><td>1</td><td class="amount">24,000</td><td class="amount">24,000</td></tr>
  <tr><td class="item-name">光熱水費</td><td></td><td>1</td><td class="amount">15,000</td><td class="amount">15,000</td></tr>
  <tr><td class="item-name">日用品</td><td></td><td>1</td><td class="amount">4,500</td><td class="amount">4,500</td></tr>
  <tr class="empty"><td></td><td></td><td></td><td></td><td></td></tr>
  <tr class="empty"><td></td><td></td><td></td><td></td><td></td></tr>
  <tr class="empty"><td></td><td></td><td></td><td></td><td></td></tr>
  <tr class="empty"><td></td><td></td><td></td><td></td><td></td></tr>
  <tr class="empty"><td></td><td></td><td></td><td></td><td></td></tr>
  <tr class="subtotal"><td class="item-name">小　計</td><td></td><td></td><td></td><td class="amount">69,500</td></tr>
</table>
</body>
</html>
