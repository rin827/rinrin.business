<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>領収書 令和8年3月 菅原正憲</title>
<style>
  body { font-family: 'MS Mincho', 'Hiragino Mincho Pro', serif; max-width: 750px; margin: 30px auto; padding: 30px; font-size: 13px; }
  h1 { text-align: center; font-size: 28px; letter-spacing: 0.5em; border-bottom: 3px solid #000; padding-bottom: 8px; margin-bottom: 20px; }
  .date { text-align: right; margin-bottom: 20px; }
  .header { display: flex; justify-content: space-between; margin-bottom: 10px; }
  .left { flex: 1; }
  .right { font-size: 12px; line-height: 2; text-align: left; margin-left: 30px; }
  .stamp-area { border: 1px solid #000; width: 70px; height: 70px; text-align: center; line-height: 70px; font-size: 11px; float: right; margin-bottom: 4px; }
  .recipient { font-size: 16px; border-bottom: 2px double #000; padding-bottom: 4px; margin-bottom: 16px; display: inline-block; min-width: 220px; }
  .subject { border-bottom: 1px solid #000; padding-bottom: 4px; margin-bottom: 4px; }
  .ryoshubi { border-bottom: 1px solid #000; padding-bottom: 4px; margin-bottom: 4px; }
  .blank-line { border-bottom: 1px solid #000; margin-bottom: 4px; height: 20px; }
  .total-section { margin: 16px 0; }
  .total-label { font-size: 16px; font-weight: bold; display: inline-block; padding-right: 20px; }
  .total-amount { font-size: 20px; font-weight: bold; display: inline-block; margin-left: 20px; text-decoration: underline; text-decoration-style: double; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  th, td { border: 1px solid #000; padding: 5px 8px; text-align: center; }
  .item-name { text-align: left; }
  .amount { text-align: right; }
  .section-header td { text-align: left; font-weight: bold; }
  .subtotal td { font-weight: bold; }
  .empty td { height: 22px; }
</style>
</head>

</html>
